name: Build and Release

on:
  push:
    branches:
      - main  # Build on every push to main
    tags:
      - 'v*.*.*'  # Triggers on version tags like v1.0.0
  workflow_dispatch:  # Allows manual triggering
    inputs:
      version:
        description: 'Version number (e.g., 1.0.0)'
        required: true
        type: string

permissions:
  contents: write  # Required to create releases

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pyinstaller

      - name: Build executable
        shell: cmd
        run: |
          pyinstaller --clean --noconfirm sandsound.spec

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: sandsound-windows
          path: dist/SandSound.exe
          retention-days: 30

  release:
    needs: build
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v') || github.event_name == 'workflow_dispatch'
    permissions:
      contents: write  # Required to create releases
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Determine version
        id: version
        run: |
          if [ "${{ github.event_name }}" == "workflow_dispatch" ]; then
            echo "version=${{ github.event.inputs.version }}" >> $GITHUB_OUTPUT
          else
            VERSION=${GITHUB_REF#refs/tags/v}
            echo "version=$VERSION" >> $GITHUB_OUTPUT
          fi

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Prepare release assets
        run: |
          mkdir -p release-assets
          VERSION="${{ steps.version.outputs.version }}"
          if [ -f "artifacts/sandsound-windows/SandSound.exe" ]; then
            cp artifacts/sandsound-windows/SandSound.exe release-assets/SandSound-Windows-${VERSION}.exe
          fi

      - name: Create Release
        uses: softprops/action-gh-release@v1
        with:
          tag_name: v${{ steps.version.outputs.version }}
          name: Release v${{ steps.version.outputs.version }}
          body: |
            ## SandSound v${{ steps.version.outputs.version }}
            
            ### Downloads
            - **Windows**: SandSound-Windows-${{ steps.version.outputs.version }}.exe
            
            ### Installation
            - **Windows**: Download the .exe file and run it
            
            **Note**: FFmpeg is required for audio conversion. Make sure it's installed on your system or configured in the app settings.
          files: release-assets/*
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  # Build-only job for main branch (artifacts only, no release)
  build-main:
    needs: build
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main' && !startsWith(github.ref, 'refs/tags/')
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Determine version
        id: version
        run: |
          LATEST_TAG=$(git describe --tags --abbrev=0 2>/dev/null || echo "v0.0.0")
          TAG_VERSION=${LATEST_TAG#v}
          COMMITS_SINCE_TAG=$(git rev-list --count ${LATEST_TAG}..HEAD 2>/dev/null || echo "0")
          SHORT_SHA=$(git rev-parse --short HEAD)
          
          if [ "$COMMITS_SINCE_TAG" -gt "0" ]; then
            IFS='.' read -r MAJOR MINOR PATCH <<< "$TAG_VERSION"
            PATCH=$((PATCH + COMMITS_SINCE_TAG))
            VERSION="${MAJOR}.${MINOR}.${PATCH}-dev.${SHORT_SHA}"
          else
            VERSION="${TAG_VERSION}-dev.${SHORT_SHA}"
          fi
          
          echo "version=$VERSION" >> $GITHUB_OUTPUT

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Prepare build artifacts
        run: |
          mkdir -p build-assets
          VERSION="${{ steps.version.outputs.version }}"
          if [ -f "artifacts/sandsound-windows/SandSound.exe" ]; then
            cp artifacts/sandsound-windows/SandSound.exe build-assets/SandSound-Windows-${VERSION}.exe
          fi

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: build-${{ steps.version.outputs.version }}
          path: build-assets/*
          retention-days: 7
